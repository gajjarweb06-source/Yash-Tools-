<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Background pado */
        .modal-overlay {
            display: none;
            /* Pehla chhupavelu rehse */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        /* Form Box */
        .modal-content {
            background: #fff;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            border-radius: 8px;
            position: relative;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .modal-content h3 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #2196F3;
            display: inline-block;
            padding-bottom: 5px;
        }

        /* Close Button */
        .close-btn {
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 28px;
            cursor: pointer;
            color: #666;
        }

        /* Form Inputs */
        #popupForm input,
        #popupForm textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            /* Padding bar na jay e mate */
        }

        /* Submit Button */
        .send-btn {
            background: #2196F3;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .send-btn:hover {
            background: #1976D2;
        }
    </style>
</head>

<body>
    <!-- Pop-up Modal Container -->
    <div id="inquiryModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn">&times;</span>

            <h3>Get A Free Quote</h3>
            <p>Please fill out the form below and we will get back to you.</p>

            <form id="popupForm">
                <input type="text" placeholder="Your Name" required>
                <input type="tel" placeholder="Phone Number" required>
                <input type="email" placeholder="Email Address">
                <input type="text" placeholder="Subject">
                <textarea placeholder="Message" rows="4"></textarea>
                <button type="submit" class="send-btn">Send Message</button>
            </form>
        </div>
    </div>
